name: 功能请求
description: 建议新功能或改进
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: 功能描述
      description: 你希望添加什么功能？
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: 使用场景
      description: 为什么需要这个功能？
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 是否考虑过其他解决方式？
