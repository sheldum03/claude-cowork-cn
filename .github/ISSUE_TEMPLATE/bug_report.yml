name: Bug 报告
description: 报告安装或使用中遇到的问题
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: 感谢报告问题！请尽量详细填写以下信息。

  - type: dropdown
    id: os
    attributes:
      label: 操作系统
      options:
        - macOS
        - Windows
    validations:
      required: true

  - type: input
    id: os-version
    attributes:
      label: 系统版本
      placeholder: "例如：macOS 14.0 或 Windows 11 23H2"
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python 版本
      placeholder: "运行 python3 --version 查看"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: 问题描述
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      placeholder: |
        1. 运行 sudo python3 install.py
        2. 选择简体中文
        3. 出现错误……
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 错误日志
      render: shell
